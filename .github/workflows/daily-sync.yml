name: Daily Fork Sync

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fork-updater-daily
  cancel-in-progress: false

jobs:
  sync-forks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run fork sync and dashboard generation
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORK_SYNC_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: node scripts/sync-forks.mjs

      - name: Commit dashboard updates
        run: |
          if git diff --quiet; then
            echo "No dashboard changes to commit"
            exit 0
          fi
          git add README.md data/last-run.json
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "chore: update fork sync dashboard"
          git push
